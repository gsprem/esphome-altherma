# ESPHome Altherma Heat Pump Configuration Example
# 
# This example shows how to configure the Altherma component for your heat pump.
# Copy parameter_id values directly from ESPAltherma definition files.
# See: https://github.com/raomin/ESPAltherma/tree/main/include/def

esphome:
  name: altherma-heatpump
  friendly_name: Altherma Heat Pump

esp32:
  board: esp32dev
  framework:
    type: arduino

# Enable logging
logger:
  level: DEBUG

# Enable Home Assistant API
api:
  encryption:
    key: !secret api_encryption_key

# Enable OTA updates
ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  
  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Altherma Fallback"
    password: !secret fallback_password

captive_portal:

# Optional: MQTT for standalone use without Home Assistant
# mqtt:
#   broker: !secret mqtt_broker
#   username: !secret mqtt_user
#   password: !secret mqtt_password

# Load the Altherma external component
external_components:
  - source: github://gsprem/esphome-altherma@main
    components: [altherma]
    refresh: 0s  # Always fetch latest (or use "1d" for daily)


# UART configuration for X10A connection
# Default pins for ESP32: RX=GPIO16, TX=GPIO17
uart:
  tx_pin: GPIO17
  rx_pin: GPIO16
  baud_rate: 9600
  parity: EVEN

# Altherma Heat Pump Hub
altherma:
  id: heatpump
  update_interval: 30s

# Temperature Sensors
sensor:
  - platform: altherma
    altherma_id: heatpump
    parameter_id: '{0x20,0,105,2,1,"R1T-Outdoor air temp."}'
    accuracy_decimals: 1
    unit_of_measurement: "°C"
    device_class: "temperature"
    name: "Outdoor Temperature"

  - platform: altherma
    altherma_id: heatpump
    parameter_id: '{0x61,10,105,2,1,"DHW tank temp. (R5T)"}'
    accuracy_decimals: 1
    unit_of_measurement: "°C"
    device_class: "temperature"
    name: "DHW Tank Temperature"

  - platform: altherma
    altherma_id: heatpump
    parameter_id: '{0x61,2,105,2,1,"Leaving water temp. before BUH (R1T)"}'
    accuracy_decimals: 1
    unit_of_measurement: "°C"
    device_class: "temperature"    
    name: "Leaving Water Temperature"

  - platform: altherma
    altherma_id: heatpump
    parameter_id: '{0x61,8,105,2,1,"Inlet water temp.(R4T)"}'
    accuracy_decimals: 1
    unit_of_measurement: "°C"
    device_class: "temperature"    
    name: "Return Water Temperature"

  - platform: altherma
    altherma_id: heatpump
    parameter_id: '{0x21,0,105,2,-1,"INV primary current (A)"}'
    name: "Inverter Current"
    device_class: "current"
    unit_of_measurement: "A"
    accuracy_decimals: 1

  - platform: altherma
    altherma_id: heatpump
    parameter_id: '{0x30,0,152,1,-1,"INV frequency (rps)"}'
    name: "Inverter Frequency (rps)"
    device_class: "frequency"
    unit_of_measurement: "Hz"
    accuracy_decimals: 0

  - platform: altherma
    altherma_id: heatpump
    parameter_id: '{0x21,4,101,2,-1,"Voltage (N-phase) (V)"}'
    name: "Voltage"
    device_class: "voltage"
    unit_of_measurement: "V"
    accuracy_decimals: 0

  - platform: altherma
    altherma_id: heatpump
    parameter_id: '{0x62,9,105,2,-1,"Flow sensor (l/min)"}'
    name: "Water Flow"
    device_class: "volume_flow_rate"
    unit_of_measurement: "L/min"
    accuracy_decimals: 1

  - platform: altherma
    altherma_id: heatpump
    parameter_id: '{0x62,11,105,1,2,"Water pressure"}'
    accuracy_decimals: 1
    name: "Water pressure (bar)"
    device_class: "pressure"
    unit_of_measurement : "bar"

  - platform: altherma
    altherma_id: heatpump
    parameter_id: '{0x30,0,211,1,-1,"Fan 1 (10 rpm)"}'
    name: "Fan"
    device_class: "frequency"
    unit_of_measurement: "Hz"
    accuracy_decimals: 1
    filters:
      - multiply: 10   # multiply by 10

  - platform: altherma
    altherma_id: heatpump
    parameter_id: '{0x64,14,152,1,1,"Target delta T heating"}'
    accuracy_decimals: 1
    unit_of_measurement: "°C"
    device_class: "temperature"    
    name: "Target delta T heating"

# Text Sensors for status/modes
text_sensor:
  - platform: altherma
    altherma_id: heatpump
    parameter_id: '{0x10,0,217,1,-1,"Operation Mode"}'
    name: "Operation Mode"

  - platform: altherma
    altherma_id: heatpump
    parameter_id: '{0x60,2,315,1,-1,"I/U operation mode"}'
    name: "Indoor Unit Mode"

  - platform: altherma
    altherma_id: heatpump
    parameter_id: '{0x60,5,203,1,-1,"Error type"}'
    name: "Error Type"

  - platform: altherma
    altherma_id: heatpump
    parameter_id: '{0x60,3,204,1,-1,"Error Code"}'
    name: "Error Code"

  - platform: altherma
    altherma_id: heatpump
    parameter_id: '{0x10,1,304,1,-1,"Defrost Operation"}'
    name: "Defrost Operation"

  - platform: altherma
    altherma_id: heatpump
    parameter_id: '{0x62,2,304,1,-1,"Powerful DHW Operation. ON/OFF"}'
    name: "Powerful DHW Operation"

  - platform: altherma
    altherma_id: heatpump
    parameter_id: '{0x60,12,301,1,-1,"Water pump operation"}'
    name: "Water pump operation"

  - platform: altherma
    altherma_id: heatpump
    parameter_id: '{0x62,8,302,1,-1,"Circulation pump operation"}'
    name: "Circulation pump operation"	
